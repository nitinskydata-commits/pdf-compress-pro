[build]
  command = "npm run build:admin"
  publish = "pdf-compressor/frontend"

[functions]
  directory = "netlify/functions"
  node_bundle = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
