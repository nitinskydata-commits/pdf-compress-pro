# Netlify Config v2
[build]
  command = "npm run build:admin"
  publish = "pdf-compressor/frontend"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "https://pdf-compress-pro-1.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
